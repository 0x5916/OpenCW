info:
  name: Refresh Token
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/v1/auth/refresh
  body:
    type: json
    data: |
      {
        "refresh_token": "{{refresh_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("access_token", res.body.access_token);
        bru.setEnvVar("refresh_token", res.body.refresh_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
